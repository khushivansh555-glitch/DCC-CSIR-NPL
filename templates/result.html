<!DOCTYPE html>
<html>

<head>
    <title>Results</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="page-wrapper">
        <div class="result-card">
            <header class="form-header">
                <h1>Uncertainty Analysis Results</h1>
                <p class="subtitle">Review the calculated values and download the supporting XML or XSLT files.</p>
            </header>

            <table class="result-table">
                <thead>
                    <tr>
                        <th>Parameter</th>
                        <th>Value</th>
                    </tr>
                </thead>
                <tbody>
                    {% for key, value in results.items() %}
                    <tr>
                        <td>{{ key }}</td>
                        <td>{{ value }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>

            <section class="graph-section">
                <h3>Bayesian Inference Graph</h3>
                <img class="bayesian-graph" src="{{ url_for('static', filename='bayesian_graph.png') }}" alt="Bayesian inference graph">
            </section>

            <section class="graph-section">
                <h3>Monte Carlo Histogram</h3>
                <img class="bayesian-graph" src="{{ url_for('static', filename='mc_histogram.png') }}" alt="Monte Carlo histogram">
            </section>

            <div class="actions">
                <a href="/view/certificate"><button type="button">View Certificate</button></a>
                <a href="/download/pdf"><button type="button">Download PDF</button></a>
                <a href="/download/xml"><button type="button">Download XML</button></a>
                <a href="/download/xslt"><button type="button">Download XSLT</button></a>
            </div>
        </div>
    </div>
</body>

</html>
