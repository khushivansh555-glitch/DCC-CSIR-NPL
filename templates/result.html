<!DOCTYPE html>
<html>

<head>

<title>Results</title>

<style>

body{
font-family:Arial;
margin:40px;
}

table{
border-collapse:collapse;
width:60%;
}

th,td{
border:1px solid black;
padding:8px;
}

button{
padding:10px 20px;
margin-right:10px;
margin-top:20px;
cursor:pointer;
}

</style>

</head>

<body>

<h2>Uncertainty Analysis Results</h2>

<table>

<tr>
<th>Parameter</th>
<th>Value</th>
</tr>

{% for key, value in results.items() %}

<tr>
<td>{{ key }}</td>
<td>{{ value }}</td>
</tr>

{% endfor %}

</table>
<br>

<h3>Bayesian Inference Graph</h3>

<img
src="{{ url_for('static', filename='bayesian_graph.png') }}"
width="700">

<br>

<a href="/download/xml">
<button>
Download XML
</button>
</a>

<a href="/download/xslt">
<button>
Download XSLT
</button>
</a>

</body>

</html>
