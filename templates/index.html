<!doctype html>
<html>
  <head>
    <title>Uncertainty Analysis</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>

  <body>
    <div class="page-wrapper">
      <div class="form-card">
        <header class="form-header">
          <h1>Uncertainty Analysis</h1>
          <p class="subtitle">
            Upload your Excel file and enter the instrument certificate details.
          </p>
        </header>

        <form action="/calculate" method="POST" enctype="multipart/form-data">
          <div class="form-grid">
            <div class="field-row">
              <label>Certificate Number</label>
              <input type="text" name="certificate_number" required />
            </div>
            <div class="field-row">
              <label>Customer Name</label>
              <input type="text" name="customer_name" required />
            </div>
            <div class="field-row">
              <label>Organization</label>
              <input type="text" name="organization" />
            </div>
            <div class="field-row">
              <label>Instrument Name</label>
              <input type="text" name="instrument_name" required />
            </div>
            <div class="field-row">
              <label>Instrument ID</label>
              <input type="text" name="instrument_id" required />
            </div>
            <div class="field-row">
              <label>Manufacturer</label>
              <input type="text" name="manufacturer" />
            </div>
            <div class="field-row">
              <label>Model Number</label>
              <input type="text" name="model_number" />
            </div>
            <div class="field-row">
              <label>Serial Number</label>
              <input type="text" name="serial_number" />
            </div>
            <div class="field-row">
              <label>Calibration Date</label>
              <input type="date" name="calibration_date" required />
            </div>
            <div class="field-row">
              <label>Ambient Temperature (°C)</label>
              <input type="number" step="0.01" name="ambient_temperature" />
            </div>
            <div class="field-row">
              <label>Humidity (%)</label>
              <input type="number" step="0.01" name="humidity" />
            </div>
            <div class="field-row field-full">
              <label>Remarks</label>
              <textarea name="remarks"></textarea>
            </div>
          </div>

          <hr />

          <div class="field-row">
            <label>Upload Excel File</label>
            <input type="file" name="excel" required />
          </div>

          <div class="field-row">
            <label>Sheet Name</label>
            <select name="sheet_name" disabled>
              <option value="">Select sheet</option>
            </select>
          </div>

          <div class="field-row">
            <label>Column Name</label>
            <select name="column_name" disabled>
              <option value="">Select column</option>
            </select>
          </div>

          <div class="form-grid">
            <div class="field-row">
              <label>Resolution</label>
              <div class="inline-control">
                <input type="number" step="any" name="resolution" required />
                <select name="resolution_unit">
                  <option value="Ω">Ω</option>
                  <option value="kΩ">kΩ</option>
                  <option value="MΩ">MΩ</option>
                  <option value="V">V</option>
                  <option value="mV">mV</option>
                  <option value="A">A</option>
                  <option value="mA">mA</option>
                </select>
              </div>
            </div>
            <div class="field-row">
              <label>Calibration Uncertainty</label>
              <div class="inline-control">
                <input type="number" step="any" name="calibration" required />
                <select name="calibration_unit">
                  <option value="Ω">Ω</option>
                  <option value="kΩ">kΩ</option>
                  <option value="MΩ">MΩ</option>
                  <option value="V">V</option>
                  <option value="mV">mV</option>
                  <option value="A">A</option>
                  <option value="mA">mA</option>
                </select>
              </div>
            </div>
            <div class="field-row">
              <label>Drift</label>
              <div class="inline-control">
                <input type="number" step="any" name="drift" required />
                <select name="drift_unit">
                  <option value="Ω">Ω</option>
                  <option value="kΩ">kΩ</option>
                  <option value="MΩ">MΩ</option>
                  <option value="V">V</option>
                  <option value="mV">mV</option>
                  <option value="A">A</option>
                  <option value="mA">mA</option>
                </select>
              </div>
            </div>
            <div class="field-row">
              <label>Temperature Effect</label>
              <div class="inline-control">
                <input type="number" step="any" name="temperature" required />
                <select name="temperature_unit">
                  <option value="Ω">Ω</option>
                  <option value="kΩ">kΩ</option>
                  <option value="MΩ">MΩ</option>
                  <option value="V">V</option>
                  <option value="mV">mV</option>
                  <option value="A">A</option>
                  <option value="mA">mA</option>
                </select>
              </div>
            </div>
          </div>

          <script>
            document.addEventListener("DOMContentLoaded", function () {
              const excelInput = document.querySelector("input[name='excel']");
              const sheetSelect = document.querySelector("select[name='sheet_name']");
              const columnSelect = document.querySelector("select[name='column_name']");

              const clearSelect = (select, placeholder) => {
                select.innerHTML = "";
                const option = document.createElement("option");
                option.value = "";
                option.textContent = placeholder;
                select.appendChild(option);
              };

              const populateSelect = (select, items, placeholder) => {
                clearSelect(select, placeholder);
                items.forEach((item) => {
                  const option = document.createElement("option");
                  option.value = item;
                  option.textContent = item;
                  select.appendChild(option);
                });
                select.disabled = items.length === 0;
              };

              const fetchMetadata = async (sheetName) => {
                const file = excelInput.files[0];
                if (!file) {
                  clearSelect(sheetSelect, "Select sheet");
                  clearSelect(columnSelect, "Select column");
                  sheetSelect.disabled = true;
                  columnSelect.disabled = true;
                  return;
                }

                const formData = new FormData();
                formData.append("excel", file);
                if (sheetName) {
                  formData.append("sheet_name", sheetName);
                }

                try {
                  const response = await fetch("/excel_meta", {
                    method: "POST",
                    body: formData,
                  });
                  const data = await response.json();

                  populateSelect(sheetSelect, data.sheets || [], "Select sheet");
                  populateSelect(columnSelect, data.columns || [], "Select column");
                } catch (error) {
                  clearSelect(sheetSelect, "Select sheet");
                  clearSelect(columnSelect, "Select column");
                  sheetSelect.disabled = true;
                  columnSelect.disabled = true;
                }
              };

              excelInput.addEventListener("change", () => {
                fetchMetadata();
              });

              sheetSelect.addEventListener("change", () => {
                const sheetValue = sheetSelect.value;
                if (sheetValue) {
                  fetchMetadata(sheetValue);
                }
              });
            });
          </script>

          <div class="field-row">
            <label>Measured Quantity</label>
            <select name="quantity">
              <option value="Resistance">Resistance</option>
              <option value="Capacitance">Capacitance</option>
              <option value="Inductance">Inductance</option>
              <option value="Voltage">Voltage</option>
              <option value="Current">Current</option>
            </select>
          </div>

          <div class="field-row">
            <label>Confidence Level</label>
            <select name="confidence">
              <option value="90">90%</option>
              <option value="95" selected>95%</option>
              <option value="99">99%</option>
            </select>
          </div>

          <div class="actions">
            <button type="submit">Calculate Result</button>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
